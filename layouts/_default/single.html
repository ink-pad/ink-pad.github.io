{{ define "main" }}
<article class="section">
  <div class="container">
    <header class="post-header">
      <h1 class="post-header__title">{{ .Title }}</h1>
      {{ with .Date }}
        <div class="post-header__meta">
          <time datetime="{{ .Format "2006-01-02" }}">{{ dateFormat "January 2, 2006" . }}</time>
        </div>
      {{ end }}
    </header>
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
